spring.datasource.url=${DB_ADDRESS}/${DB_DATABASE}?autoReconnect=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Swagger
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.path=/api/docs.html
springdoc.api-docs.path=/api/v3/api-docs/swagger-config

# This prevents the spring boot app from crashing when a db connection is not made
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.generate-ddl=false
spring.jpa.hibernate.ddl-auto=none
spring.datasource.continueOnError=true

# Temporary debug logging for cleaning job diagnostics
# logging.level.com.example.cis4900.spring.template.cleaning=DEBUG

# Multipart upload size limits
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Flyway config
# Turn on Flyway, look for migrations in flyway/sql
spring.flyway.enabled=true 
spring.flyway.locations=filesystem:/flyway/sql
spring.flyway.baseline-on-migrate=true

# Checks old migrations havent been edited
spring.flyway.validate-on-migrate=true

# Retries to connect to MariaDB, tries 30 times, waits 2 seconds between tries
spring.flyway.connect-retries=30
spring.flyway.connect-retries-interval=2
